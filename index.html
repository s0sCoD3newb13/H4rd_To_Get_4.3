<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Science & Math Challenge</title>
    <style>
        /* 전체 배경을 밝게 설정 */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #f4f7f6; /* 밝고 깨끗한 회색빛 배경 */
            color: #333; /* 글자는 어두운 회색으로 가독성 확보 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
    
        /* 퀴즈 박스를 하얗고 입체감 있게 */
        .container { 
            text-align: center; 
            background: #ffffff; /* 순백색 배경 */
            padding: 40px; 
            border-radius: 20px; /* 더 둥글게 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 부드럽고 가벼운 그림자 */
            width: 80%; 
            max-width: 600px; 
            border: 1px solid #e0e0e0; /* 연한 테두리 */
        }
    
        .step { display: none; animation: fadeIn 0.5s ease-in-out; }
        .step.active { display: block; }
    
        /* 제목 색상을 밝고 산뜻하게 */
        h1 { 
            color: #2ecc71; /* 산뜻한 에메랄드 그린 */
            margin-bottom: 20px; 
            font-weight: bold;
        }
    
        /* 과목명 디자인 태그 변경 */
        .design-tag { 
            font-size: 0.9em; 
            color: #27ae60; /* 더 진한 초록색 */
            background-color: #e8f8f5; /* 아주 연한 초록색 배경 */
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            display: inline-block; 
            padding: 5px 15px;
            border-radius: 50px;
        }
    
        /* 이미지 박스를 깔끔하게 */
        .quiz-img { 
            width: 100%; 
            max-height: 250px; 
            object-fit: contain; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; /* 연한 테두리 */
            background: #fafafa; /* 아주 연한 회색 배경 */
            border-radius: 10px;
        }
    
        /* 입력창 디자인을 모던하게 */
        input { 
            padding: 15px; 
            width: 80%; 
            border-radius: 8px; 
            border: 2px solid #ddd; /* 연한 테두리 */
            margin-bottom: 20px; 
            background: #fff; 
            color: #333; 
            font-size: 1.1em; 
            outline: none; 
            transition: 0.3s;
        }
    
        /* 입력창 클릭 시 포커스 효과 */
        input:focus {
            border-color: #2ecc71; /* 테두리를 에메랄드 색으로 */
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }
    
        /* 버튼 그룹 배치 */
        .btn-group { display: flex; justify-content: center; gap: 15px; }
    
        /* 모든 버튼 공통 스타일 */
        button { 
            padding: 12px 25px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 1em;
        }
    
        /* 다음 단계 버튼 (밝고 눈에 띄게) */
        .next-btn { 
            background: #2ecc71; /* 산뜻한 에메랄드 그린 */
            color: #fff; /* 흰색 글자 */
        }
        .next-btn:hover { 
            background: #27ae60; /* 더 진한 초록색 */
            transform: scale(1.05); 
        }
    
        /* 이전 단계 버튼 (연하게) */
        .prev-btn { 
            background: #ecf0f1; /* 아주 연한 회색 */
            color: #7f8c8d; /* 진한 회색 글자 */
        }
        .prev-btn:hover { 
            background: #bdc3c7; /* 조금 더 진한 회색 */
        }
    
        /* 정밀 분석 버튼 (파란색 포인트) */
        .analyze-btn {
            background: #3498db; /* 밝은 파란색 */
            color: white;
        }
        .analyze-btn:hover {
            background: #2980b9;
        }
    
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <span class="design-tag">Physics</span>
        <h1>STEP 01</h1>
        <img src="4.3_Physics.png" alt="Physics Quiz" class="quiz-img">
        <input type="text" id="ans1" placeholder="Password: ">
        <div class="btn-group">
            <button class="next-btn" onclick="check(1, '3')">다음 단계</button>
        </div>
    </div>

    <div id="step2" class="step">
        <span class="design-tag">Earth science</span>
        <h1>STEP 02</h1>
        <img src="4.3_Earth science.png" alt="Earth Science Quiz" class="quiz-img">
        <input type="text" id="ans2" placeholder="이 암석의 이름은?">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(2)">이전 단계</button>
            <button class="next-btn" onclick="check(2, '현무암')">다음 단계</button>
        </div>
    </div>

    <div id="step3" class="step">
        <span class="design-tag">Math</span>
        <h1>STEP 03</h1>
        <img src="4.3_Math.png" alt="Math Quiz" class="quiz-img">
        <input type="text" id="ans3" placeholder="Password: ">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(3)">이전 단계</button>
            <button class="next-btn" onclick="check(3, '10')">다음 단계</button>
        </div>
    </div>

    <div id="step4" class="step">
        <h1>CHEMIST_Y</h1>
        <p>뭘 해야 하게??</p>
        <input type="text" id="ans4" placeholder="Password: chemisty">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(4)">이전 단계</button>
            <button class="next-btn" onclick="check(4, 'chemisty')">다음 단계</button>
        </div>
    </div>

    <div id="step5" class="step">
        <h1>우아아 아직 끝이 아니야 ㅜㅜ</h1>
        <p>뭘 해야 하게??</p>
        <input type="text" id="ans5" placeholder="Password: last_정보\과학/개론^">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(5)">이전 단계</button>
            <button class="next-btn" onclick="check(5, 'last_정보\\과학/개론^')">다음 단계</button>
        </div>
    </div>

    <div id="step6" class="step">
        <h1 style="color: #ffde03; font-size: 3em;">🚩 CATCH_THE_FLAG!</h1>
        <p>모든 단계를 통과하셨습니다! 이제 Flag를 구하면 되겠죠??^^</p>
        <button class="prev-btn" onclick="goBack(6)">처음부터 다시 하기</button>
    </div>
</div>

<script>
    // 다음 단계로 가는 함수
    function check(currentStep, password) {
        const userInput = document.getElementById('ans' + currentStep).value;
        if (userInput === password) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep + 1)).classList.add('active');
        } else {
            alert('틀렸습니다! 다시 생각해보세요.');
        }
    }

    // 이전 단계로 돌아가는 함수
    function goBack(currentStep) {
        document.getElementById('step' + currentStep).classList.remove('active');
        document.getElementById('step' + (currentStep - 1)).classList.add('active');
    }
</script>

</body>
</html>
