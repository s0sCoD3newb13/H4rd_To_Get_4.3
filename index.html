<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Science & Math Challenge</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #2d2d2d; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 600px; border: 1px solid #444; }
        .step { display: none; animation: fadeIn 0.5s ease-in-out; }
        .step.active { display: block; }
        h1 { color: #00ffcc; margin-bottom: 20px; }
        .design-tag { font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .quiz-img { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 20px; border: 1px solid #555; background: #000; color: #555; line-height: 250px; }
        input { padding: 12px; width: 80%; border-radius: 5px; border: none; margin-bottom: 15px; background: #444; color: #fff; font-size: 1.1em; outline: none; }
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; border-radius: 5px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .next-btn { background: #00ffcc; color: #1a1a1a; }
        .next-btn:hover { background: #00cca3; transform: scale(1.05); }
        .prev-btn { background: #555; color: #fff; }
        .prev-btn:hover { background: #777; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <span class="design-tag">Physics</span>
        <h1>STEP 01</h1>
        <img src="4.3_Physics.png" alt="Physics Quiz" class="quiz-img">
        <input type="text" id="ans1" placeholder="Password: ">
        <div class="btn-group">
            <button class="next-btn" onclick="check(1, '3')">다음 단계</button>
        </div>
    </div>

    <div id="step2" class="step">
        <span class="design-tag">Earth science</span>
        <h1>STEP 02</h1>
        <img src="4.3_Earth science.png" alt="Earth Science Quiz" class="quiz-img">
        <input type="text" id="ans2" placeholder="이 암석의 이름은?">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(2)">이전 단계</button>
            <button class="next-btn" onclick="check(2, '현무암')">다음 단계</button>
        </div>
    </div>

    <div id="step3" class="step">
        <span class="design-tag">Math</span>
        <h1>STEP 03</h1>
        <img src="4.3_Math.png" alt="Math Quiz" class="quiz-img">
        <input type="text" id="ans3" placeholder="Password: ">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(3)">이전 단계</button>
            <button class="next-btn" onclick="check(3, '10')">다음 단계</button>
        </div>
    </div>

    <div id="step4" class="step">
        <h1>CHEMIST_Y</h1>
        <p>비밀번호: chemisty</p>
        <input type="text" id="ans4" placeholder="Password: chemisty">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(4)">이전 단계</button>
            <button class="next-btn" onclick="check(4, 'chemisty')">다음 단계</button>
        </div>
    </div>

    <div id="step5" class="step">
        <h1>우아아 아직 끝이 아니야 ㅜㅜ</h1>
        <p>비밀번호: last_정보\과학/개론^</p>
        <input type="text" id="ans5" placeholder="Password: last_정보\\과학/개론^">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(5)">이전 단계</button>
            <button class="next-btn" onclick="check(5, 'last_정보\\과학/개론^')">다음 단계</button>
        </div>
    </div>

    <div id="step6" class="step">
        <h1 style="color: #ffde03; font-size: 3em;">🚩 CATCH_THE_FLAG!</h1>
        <p>축하합니다! 모든 단계를 통과하셨습니다.</p>
        <button class="prev-btn" onclick="goBack(6)">처음부터 다시 하기</button>
    </div>
</div>

<script>
    // 다음 단계로 가는 함수
    function check(currentStep, password) {
        const userInput = document.getElementById('ans' + currentStep).value;
        if (userInput === password) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep + 1)).classList.add('active');
        } else {
            alert('틀렸습니다! 다시 생각해보세요.');
        }
    }

    // 이전 단계로 돌아가는 함수
    function goBack(currentStep) {
        document.getElementById('step' + currentStep).classList.remove('active');
        document.getElementById('step' + (currentStep - 1)).classList.add('active');
    }
</script>

</body>
</html>
