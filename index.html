<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Science & Math Challenge</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #f4f7f6;
            color: #333;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .container { 
            text-align: center; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 80%; 
            max-width: 600px; 
            border: 1px solid #e0e0e0;
        }
    
        .step { display: none; animation: fadeIn 0.5s ease-in-out; }
        .step.active { display: block; }
    
        h1 { 
            color: #2ecc71;
            margin-bottom: 20px; 
            font-weight: bold;
        }
    
        .design-tag { 
            font-size: 0.9em; 
            color: #27ae60;
            background-color: #e8f8f5;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            display: inline-block; 
            padding: 5px 15px;
            border-radius: 50px;
        }
    
        .quiz-img { 
            width: 100%; 
            max-height: 250px; 
            object-fit: contain; 
            margin-bottom: 20px; 
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 10px;
        }
    
        input { 
            padding: 15px; 
            width: 80%; 
            border-radius: 8px; 
            border: 2px solid #ddd;
            margin-bottom: 20px; 
            background: #fff; 
            color: #333; 
            font-size: 1.1em; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }
    
        .btn-group { display: flex; justify-content: center; gap: 15px; }
    
        button { 
            padding: 12px 25px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 1em;
        }
    
        .next-btn { 
            background: #2ecc71;
            color: #fff;
        }
        .next-btn:hover { 
            background: #27ae60;
            transform: scale(1.05); 
        }
    
        .prev-btn { 
            background: #ecf0f1;
            color: #7f8c8d;
        }
        .prev-btn:hover { 
            background: #bdc3c7;
        }
    
        .analyze-btn {
            background: #3498db;
            color: white;
        }
        .analyze-btn:hover {
            background: #2980b9;
        }
    
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <span class="design-tag">Physics</span>
        <h1>STEP 01</h1>
        <img src="4.3_Physics.png" alt="Physics Quiz" class="quiz-img">
        <input type="text" id="ans1" placeholder="Password: ">
        <div class="btn-group">
            <button class="next-btn" onclick="check(1, '3')">다음 단계</button>
        </div>
    </div>

    <div id="step2" class="step">
        <span class="design-tag">Earth science</span>
        <h1>STEP 02</h1>
        <img src="4.3_Earth science.png" alt="Earth Science Quiz" class="quiz-img">
        <input type="text" id="ans2" placeholder="이 암석의 이름은?">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(2)">이전 단계</button>
            <button class="next-btn" onclick="check(2, '현무암')">다음 단계</button>
        </div>
    </div>

    <div id="step3" class="step">
        <span class="design-tag">Math</span>
        <h1>STEP 03</h1>
        <img src="4.3_Math.png" alt="Math Quiz" class="quiz-img">
        <input type="text" id="ans3" placeholder="Password: ">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(3)">이전 단계</button>
            <button class="next-btn" onclick="check(3, '10')">다음 단계</button>
        </div>
    </div>

    <div id="step4" class="step">
        <h1>CHEMISTY</h1>
        <p>4.3을 받기 위해 실수 따윈 하지 않지</p></p>
        <input type="text" id="ans4" placeholder="Password: chemisty">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(4)">이전 단계</button>
            <button class="next-btn" onclick="check(4, 'chemisty')">다음 단계</button>
        </div>
    </div>

    <div id="step5" class="step">
        <h1>우아아 아직 끝이 아니야 ㅜㅜ</h1>
        <p>Password는 이번 단계와는 관련이 없어</p>
        <input type="text" id="ans5" placeholder="Password: last_정보\과학/개론^">
        <div class="btn-group">
            <button class="prev-btn" onclick="goBack(5)">이전 단계</button>
            <button class="next-btn" onclick="check(5, 'last_정보\\과학/개론^')">다음 단계</button>
        </div>
    </div>

    <div id="step6" class="step">
        <h1 style="color: #ffde03; font-size: 3em;">🚩 CATCH_THE_FLAG!</h1>
        <p>모든 단계를 통과하셨습니다! 이제 Flag를 구하면 되겠죠??^^</p>
        <button class="prev-btn" onclick="goBack(6)">처음부터 다시 하기</button>
    </div>
</div>

<script>
    // 다음 단계로 가는 함수
    function check(currentStep, password) {
        const userInput = document.getElementById('ans' + currentStep).value;
        if (userInput === password) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep + 1)).classList.add('active');
        } else {
            alert('틀렸습니다! 다시 생각해보세요.');
        }
    }

    // 이전 단계로 돌아가는 함수
    function goBack(currentStep) {
        document.getElementById('step' + currentStep).classList.remove('active');
        document.getElementById('step' + (currentStep - 1)).classList.add('active');
    }
</script>

</body>
</html>
